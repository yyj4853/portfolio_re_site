<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRANHAND. - 향의 일상화</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js" defer></script>
    <script src="app.js" defer></script>
</head>
<body>
    <header class="topheader">
        <div class="headerinner">
            <a href="#" class="logo">GRANHAND.</a>
            <nav class="gnb">
                <a href="#fragrance">Fragrance</a>
                <a href="#journal">Journal</a>
                <a href="#stores">Stores</a>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="ambient-light"></div>
            <div class="hero-text fade-up">
                <h1>Breathe in Seoul</h1>
                <p>일상의 경계에서 피어나는 깨끗하고 절제된 향기.</p>
            </div>
        </section>

        <section id="fragrance" class="product-showcase">
            <div class="section-title fade-up">
                <h2>Signature Collection</h2>
                <p>본질에 집중한 프리미엄 라인업</p>
            </div>
            
            <div class="grid-container">
                <article class="product-card fade-up">
                    <div class="image-wrapper">
                        <div class="product-mockup"></div>
                    </div>
                    <div class="product-info">
                        <h3>Susie Salmon</h3>
                        <span class="notes">Citrus, Floral, Woody</span>
                    </div>
                </article>

                <article class="product-card fade-up">
                    <div class="image-wrapper">
                        <div class="product-mockup"></div>
                    </div>
                    <div class="product-info">
                        <h3>Kyujang</h3>
                        <span class="notes">Fig leaf, Patchouli, Pepper</span>
                    </div>
                </article>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <p>GRANHAND. Seoul, Korea</p>
    </footer>
</body>
</html>
